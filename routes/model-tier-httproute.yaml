# Single-pass model-tier routing. The Semantic Router runs as a PreRouting-phase gateway
# ExtProc (model-tier-router-extproc-policy.yaml, phase: PreRouting), so it classifies the
# prompt and sets x-selected-model BEFORE the routing decision. This route then matches that
# header to pick the provider backend — in one pass, no loopback.
# NOTE: agentgateway regex header matches are FULL-VALUE — "^gpt-" would NOT match "gpt-4o-mini";
# use "gpt-.*".
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: model-tier
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: gw
      namespace: agentgateway-system
  hostnames:
    - "api.example.com"
  rules:
    # OpenAI models (gpt-*)
    - matches:
        - path: { type: PathPrefix, value: /llm-tier }
          headers:
            - { type: RegularExpression, name: x-selected-model, value: "gpt-.*" }
      backendRefs:
        - { name: openai-tier-backend, namespace: agentgateway-system, group: agentgateway.dev, kind: AgentgatewayBackend }
    # Gemini models (gemini-*)
    - matches:
        - path: { type: PathPrefix, value: /llm-tier }
          headers:
            - { type: RegularExpression, name: x-selected-model, value: "gemini-.*" }
      backendRefs:
        - { name: gemini-tier-backend, namespace: agentgateway-system, group: agentgateway.dev, kind: AgentgatewayBackend }
    # Local vLLM (PII sink)
    - matches:
        - path: { type: PathPrefix, value: /llm-tier }
          headers:
            - { type: Exact, name: x-selected-model, value: vllm-local }
      backendRefs:
        - { name: vllm-local-backend, namespace: agentgateway-system, group: agentgateway.dev, kind: AgentgatewayBackend }
