apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: semantic-router
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: gw
      namespace: agentgateway-system
  hostnames:
    - "api.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /semantic-router
      backendRefs:
        - name: semantic-router-vllm-backend
          namespace: agentgateway-system
          group: agentgateway.dev
          kind: AgentgatewayBackend
