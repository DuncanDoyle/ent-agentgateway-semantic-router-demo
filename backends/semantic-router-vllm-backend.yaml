apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: semantic-router-vllm-backend
  namespace: agentgateway-system
spec:
  ai:
    provider:
      # host and port are siblings of the provider type, not nested inside it.
      # No model set — Semantic Router's ExtProc injects the appropriate LoRA
      # adapter name as the model field before the request reaches vLLM.
      openai: {}
      host: vllm-llama3-8b-instruct.default.svc.cluster.local
      port: 8000
