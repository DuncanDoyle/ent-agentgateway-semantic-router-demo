apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: semantic-router-vllm-backend
  namespace: agentgateway-system
spec:
  ai:
    provider:
      # Points to the in-cluster vLLM simulator via a Kubernetes Service backendRef.
      # model is set to base-model as a placeholder — Semantic Router's ExtProc
      # classifies each request and overwrites the model with the appropriate
      # LoRA adapter name before the request reaches vLLM.
      custom:
        backendRef:
          name: vllm-llama3-8b-instruct
          port: 8000
        model: base-model
        formats:
        - type: Completions
          path: /v1/chat/completions
