# vLLM Semantic Router values for the cost-aware model-tier-router use-case.
#
# This is a Helm OVERLAY applied ON TOP of the upstream agentgateway values.yaml
# (see setup-model-tier-router.sh). Helm deep-merges: map keys merge, list values
# REPLACE. So the blocks below replace `providers.models`, `routing.decisions`,
# `routing.modelCards` wholesale, and ADD `routing.signals.complexity` to the
# existing signals map (the base `domains`/`keywords` signals are preserved).
#
# Verified against the installed build's source (commit 8000843c). See
# docs/design-semantic-router-llm-routing.md → Schema verification.
#
# INSTALL-TIME CHECKS (flagged in the plan, Task 7):
#  - `config.version`: the upstream values use `v0.3` as Helm input; keep consistent.
#  - Cost selection is per-decision `algorithm: multi_factor` (default selector is
#    `static` = NOT cheapest). pricing.prompt_per_1m MUST be > 0 to rank on cost.
#  - PRICES BELOW ARE ILLUSTRATIVE — set from current OpenAI/Gemini list prices.

# Force the Service/Deployment name to exactly `model-tier-router`. Without this the
# chart's fullname helper names them `model-tier-router-semantic-router` (the release
# name doesn't contain "semantic-router"), which would not match the ExtProc policy's
# backendRef.name nor the setup script's `kubectl wait deployment/model-tier-router`.
fullnameOverride: model-tier-router

# NOTE: the SR chart does NOT render spec.strategy, so this block is IGNORED by Helm — it
# documents intent only. Recreate is actually enforced by a `kubectl patch` in
# setup-model-tier-router.sh (needed on a single node so an upgrade doesn't deadlock trying
# to surge a 2nd 2Gi pod). Keep the two in sync.
strategy:
  type: Recreate                 # single-node demo: kill old pod before new (enforced via kubectl patch)
resources:
  requests: { cpu: 500m, memory: 2Gi }
  limits:   { cpu: 1,    memory: 3Gi }

config:
  version: v0.3                  # match the upstream values' Helm input version
  providers:
    defaults:
      # Override the base default (general-expert) with one of our models.
      default_model: gemini-2.5-flash-lite
    # Pricing-only models — backend_refs omitted on purpose: SR runs as a pure
    # ExtProc classifier, agentgateway makes the upstream call. Validation passes
    # because each model carries `pricing` metadata. The model `name` is what SR
    # writes into body.model (so it must equal the real provider model id).
    models:
      - name: gemini-2.5-flash-lite
        pricing: { currency: USD, prompt_per_1m: 0.10, completion_per_1m: 0.40 }
      - name: gemini-2.5-flash
        pricing: { currency: USD, prompt_per_1m: 0.30, completion_per_1m: 2.50 }
      - name: gemini-2.5-pro
        pricing: { currency: USD, prompt_per_1m: 1.25, completion_per_1m: 10.00 }
      - name: gpt-4o-mini
        pricing: { currency: USD, prompt_per_1m: 0.15, completion_per_1m: 0.60 }
      - name: gpt-4o
        pricing: { currency: USD, prompt_per_1m: 2.50, completion_per_1m: 10.00 }
      - name: gpt-4.1
        pricing: { currency: USD, prompt_per_1m: 2.00, completion_per_1m: 8.00 }
      - name: vllm-local
        pricing: { currency: USD, prompt_per_1m: 0.01, completion_per_1m: 0.01 }

  routing:
    # REQUIRED: every model referenced below must have a modelCards entry.
    modelCards:
      - { name: gemini-2.5-flash-lite }
      - { name: gemini-2.5-flash }
      - { name: gemini-2.5-pro }
      - { name: gpt-4o-mini }
      - { name: gpt-4o }
      - { name: gpt-4.1 }
      - { name: vllm-local }

    signals:
      # PRIMARY signal. Embedding-similarity contrast: margin = hard-sim − easy-sim;
      # |margin| < threshold ⇒ "medium". Emits tier:hard / tier:medium / tier:easy.
      # Tune candidates + threshold against real demo prompts (plan Task 2/8).
      complexity:
        # threshold = the |hard_sim - easy_sim| margin needed to leave the "medium" band.
        # 0.6 was too wide: observed margins span ~[-0.4, +0.4], so every prompt collapsed to
        # medium -> gpt-4o-mini. 0.25 splits the demo prompts: analytical (~+0.40) -> hard,
        # "hello"/easy (~-0.39) -> easy, genuinely-ambiguous (~+/-0.05) -> medium. Tune empirically.
        - name: tier
          threshold: 0.25
          hard:
            candidates:
              - "prove the theorem step by step"
              - "prove that the square root of 2 is irrational"   # math-proof exemplar so proofs escalate to hard
              - "design a fault-tolerant distributed system"
              - "analyze the root cause across multiple services"
              - "derive the optimal algorithm and its time complexity"
          easy:
            candidates:
              - "what time is it"
              - "rephrase this sentence"
              - "give a one-line summary"
              - "reply with one word"
      # PII signal — OPTIONAL. Requires the pii detector model to be bundled in the
      # image AND the classifier block below. Left disabled so the first install
      # cannot fail on a missing model. To enable: uncomment this block, the
      # `global.model_catalog.modules.classifier.pii` block, and the `pii_lane`
      # decision; first verify the model exists:
      #   kubectl exec deploy/model-tier-router -n agentgateway-system -- ls models/ | grep -i pii
      # pii:
      #   - name: has_pii
      #     threshold: 0.85

    decisions:
      # --- OPTIONAL PII override (enable with the pii signal + classifier block) ---
      # - name: pii_lane
      #   description: PII detected — keep in-cluster on the local vLLM
      #   priority: 90
      #   rules: { type: pii, name: has_pii }
      #   modelRefs: [{ model: vllm-local, use_reasoning: false }]
      #   algorithm: { type: static }

      # --- Analytical + hard: quality lane, cheapest of the top tier ---
      - name: analytical_advanced
        description: Analytical domain AND hard complexity
        priority: 70
        rules:
          operator: AND
          conditions:
            - { type: domain, name: computer science }
            - { type: complexity, name: "tier:hard" }
        # NOTE: gemini-2.5-pro removed — the demo Gemini key has zero free-tier quota for it
        # (429 RESOURCE_EXHAUSTED). Hard tier uses OpenAI frontier models, which the key serves.
        modelRefs:                 # cheapest-first by convention (order is cosmetic; cost picks)
          - { model: gpt-4.1, use_reasoning: false }          # $2.00 — wins
          - { model: gpt-4o, use_reasoning: false }           # $2.50
        algorithm:
          type: multi_factor
          multi_factor:
            weights: { cost: 1.0, quality: 0, latency: 0, load: 0 }
            on_no_candidates: cheapest

      # --- Complexity tiers (primary backbone): cheapest capable per tier ---
      # Cross-provider is visible across the ladder: easy ⇒ Gemini (flash-lite),
      # medium ⇒ OpenAI (gpt-4o-mini). Hard would ideally add Gemini 2.5 Pro, but the
      # demo Gemini key has no quota for it, so hard stays on OpenAI frontier models.
      - name: advanced_tier
        description: Hard complexity (any domain) — cheapest advanced-capable
        priority: 50
        rules: { type: complexity, name: "tier:hard" }
        modelRefs:                 # gemini-2.5-pro removed (no key quota — see analytical_advanced)
          - { model: gpt-4.1, use_reasoning: false }          # $2.00 — wins
          - { model: gpt-4o, use_reasoning: false }           # $2.50
        algorithm:
          type: multi_factor
          multi_factor: { weights: { cost: 1.0, quality: 0, latency: 0, load: 0 }, on_no_candidates: cheapest }

      - name: medium_tier
        description: Medium complexity — cheapest mid-tier model (OpenAI wins here)
        priority: 40
        rules: { type: complexity, name: "tier:medium" }
        modelRefs:
          - { model: gpt-4o-mini, use_reasoning: false }      # $0.15 — wins
          - { model: gemini-2.5-flash, use_reasoning: false } # $0.30
        algorithm:
          type: multi_factor
          multi_factor: { weights: { cost: 1.0, quality: 0, latency: 0, load: 0 }, on_no_candidates: cheapest }

      - name: simple_tier
        description: Easy complexity (bulk of traffic) — cheapest simple-capable
        priority: 30
        rules: { type: complexity, name: "tier:easy" }
        modelRefs:
          - { model: gemini-2.5-flash-lite, use_reasoning: false }  # $0.10 — wins
          - { model: gpt-4o-mini, use_reasoning: false }            # $0.15
        algorithm:
          type: multi_factor
          multi_factor: { weights: { cost: 1.0, quality: 0, latency: 0, load: 0 }, on_no_candidates: cheapest }

      # No explicit fallback decision: the complexity signal always emits exactly one
      # of tier:hard|medium|easy and the three tiers above are exhaustive. If the
      # complexity signal ever fails to emit, SR falls back to
      # providers.defaults.default_model (gemini-2.5-flash-lite).

  # --- OPTIONAL: enable PII detection (pairs with the pii signal + pii_lane above) ---
  # global:
  #   model_catalog:
  #     modules:
  #       classifier:
  #         pii:
  #           model_id: models/mmbert32k-pii-detector-merged
  #           pii_mapping_path: models/mmbert32k-pii-detector-merged/pii_type_mapping.json
  #           threshold: 0.9
  #           use_cpu: true
  #           use_mmbert_32k: true
